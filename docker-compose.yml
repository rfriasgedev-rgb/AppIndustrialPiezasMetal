version: "3.9"

services:
  # ─────────────────────────────────────────────
  # MariaDB 11 - Base de Datos
  # ─────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: metalerp_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-metal_parts_db}
      MARIADB_USER: ${DB_USER:-metalerp}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      # Scripts de inicialización (se ejecutan solo si el volumen está vacío)
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/src/db/schema_requisitions_patch.sql:/docker-entrypoint-initdb.d/02_requisitions_patch.sql:ro
      - ./backend/src/db/schema_units_patch.sql:/docker-entrypoint-initdb.d/03_units_patch.sql:ro
    networks:
      - metalerp_net
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Backend - Node.js / Express API
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: metalerp_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-metalerp}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-metal_parts_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - metalerp_net
    expose:
      - "3001"

  # ─────────────────────────────────────────────
  # Frontend - React/Vite (build estático servido por Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "" # vacío = mismo origen; Nginx redirige /api → backend
    container_name: metalerp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - metalerp_net
    expose:
      - "80"

  # ─────────────────────────────────────────────
  # Nginx - Reverse Proxy (punto de entrada único)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: metalerp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - metalerp_net

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local

networks:
  metalerp_net:
    driver: bridge
